name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: typecheck
        run: npm run check

      - name: lint
        run: npm run lint

      - name: unit tests
        run: npm test

      - name: build
        run: npm run build

  migrations:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: dockvision
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: dockvision
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: apply migrations against fresh postgres
        env:
          DATABASE_URL: postgres://dockvision:testpass@localhost:5432/dockvision
        run: npm run migrate
